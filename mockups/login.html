<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Alnilam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/theme.css" />
</head>
<body>

<!-- Minimalist nav -->
<nav class="nav">
  <div class="nav-container">
    <a href="index.html" class="nav-brand">
      <img src="assets/img/alnilam.png" alt="Alnilam" class="nav-brand-logo" />
      <span class="nav-brand-text">ALNILAM</span>
    </a>
    <div>
      <span style="color: var(--text-secondary); font-size: 0.9375rem;">Belum punya akun?</span>
      <a href="register.html" class="btn btn-outline btn-sm" style="margin-left: 1rem;">Sign Up</a>
    </div>
  </div>
</nav>

<!-- Login Section -->
<section style="min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 4rem;">

  <!-- Left: brand image -->
  <div style="position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 4rem;">
    <img
      src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=1200&q=80"
      alt=""
      style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6;"
    />
    <div style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);"></div>
    <div style="position: relative; z-index: 2; max-width: 500px;">
      <div class="eyebrow mb-2">WELCOME BACK</div>
      <h2 class="display-2 mb-3">
        Continue<br />
        creating <span class="text-accent">extraordinary.</span>
      </h2>
      <p style="color: var(--text-secondary); font-size: 1.0625rem;">
        Login untuk mengakses dashboard, kelola project, dan berkolaborasi dengan creator terbaik Indonesia.
      </p>
    </div>
  </div>

  <!-- Right: form -->
  <div style="display: flex; align-items: center; justify-content: center; padding: 4rem;">
    <div style="width: 100%; max-width: 420px;">
      <div class="eyebrow mb-2">SIGN IN</div>
      <h1 class="heading-1 mb-4">Welcome back</h1>

      <form>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="admin@alnilam.test" value="admin@alnilam.test" />
        </div>

        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <label class="form-label">Password</label>
            <a href="#" style="font-size: 0.8125rem; color: var(--text-secondary); text-decoration: underline;">Forgot?</a>
          </div>
          <input type="password" class="form-input" placeholder="••••••••" value="password" />
        </div>

        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" />
            <span style="font-size: 0.9375rem;">Remember me for 30 days</span>
          </label>
        </div>

        <button type="submit" class="btn btn-accent" style="width: 100%; padding: 1rem; font-size: 1rem;">
          Sign In →
        </button>

        <div style="display: flex; align-items: center; gap: 1rem; margin: 2rem 0;">
          <div style="flex: 1; height: 1px; background: var(--border-subtle);"></div>
          <span style="font-size: 0.75rem; color: var(--text-tertiary); letter-spacing: 0.15em; text-transform: uppercase;">Or</span>
          <div style="flex: 1; height: 1px; background: var(--border-subtle);"></div>
        </div>

        <button type="button" class="btn btn-outline" style="width: 100%; margin-bottom: 0.75rem; gap: 0.75rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"/></svg>
          Continue with Google
        </button>

        <div class="mt-4" style="padding: 1.25rem; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 6px;">
          <div style="font-size: 0.75rem; font-weight: 600; color: var(--accent-primary); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem;">
            🧪 Demo Credentials
          </div>
          <div style="display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.8125rem; color: var(--text-secondary);">
            <div>
              <button type="button" style="color: var(--accent-primary); text-decoration: underline; font-family: monospace;">admin@alnilam.test</button>
              — Admin
            </div>
            <div>
              <button type="button" style="color: var(--accent-primary); text-decoration: underline; font-family: monospace;">client@alnilam.test</button>
              — Client
            </div>
            <div>
              <button type="button" style="color: var(--accent-primary); text-decoration: underline; font-family: monospace;">creator@alnilam.test</button>
              — Creator
            </div>
            <div style="margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border-subtle); color: var(--text-tertiary);">
              Password: <code style="background: var(--bg-elevated); padding: 2px 6px; border-radius: 3px;">password</code>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>

<style>
  @media (max-width: 900px) {
    body > section {
      grid-template-columns: 1fr !important;
    }
    body > section > div:first-child {
      display: none;
    }
  }
</style>

</body>
</html>
