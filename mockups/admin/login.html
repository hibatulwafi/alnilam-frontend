<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Alnilam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/theme.css" />
</head>
<body>

<section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: linear-gradient(135deg, #0a0a0a 0%, #000 100%);">
  <div style="width: 100%; max-width: 420px;">
    <!-- Logo -->
    <div style="display: flex; align-items: center; gap: 0.75rem; justify-content: center; margin-bottom: 2.5rem;">
      <span class="nav-brand-logo" style="width: 48px; height: 48px; font-size: 1.5rem;">A</span>
      <div>
        <div style="font-size: 1.5rem; font-weight: 800;">ALNILAM</div>
        <div style="font-size: 0.75rem; color: var(--accent-primary); letter-spacing: 0.15em; text-transform: uppercase;">Admin Portal</div>
      </div>
    </div>

    <div class="card" style="padding: 2.5rem;">
      <div class="text-center mb-4">
        <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">Secure Admin Access</h1>
        <p style="color: var(--text-secondary); font-size: 0.9375rem;">Sign in dengan credentials admin Anda</p>
      </div>

      <form>
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" class="form-input" placeholder="admin@alnilam.test" value="admin@alnilam.test" />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="••••••••" value="password" />
        </div>

        <div class="form-group">
          <label class="form-label">2FA Code <span style="color: var(--text-tertiary); font-weight: 400; text-transform: none; letter-spacing: 0;">(TOTP)</span></label>
          <input type="text" class="form-input" placeholder="000000" maxlength="6" style="font-family: monospace; font-size: 1.125rem; letter-spacing: 0.5em; text-align: center;" />
          <div class="form-hint">Buka Google Authenticator / Authy untuk kode 6-digit</div>
        </div>

        <button type="submit" class="btn btn-accent" style="width: 100%; padding: 1rem;">
          Sign In to Admin
        </button>

        <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-subtle);">
          <div style="display: flex; align-items: center; gap: 0.5rem; justify-content: center; color: var(--text-tertiary); font-size: 0.8125rem;">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            <span>Semua login activity di-audit log</span>
          </div>
        </div>
      </form>
    </div>

    <div style="text-align: center; margin-top: 2rem;">
      <a href="../login.html" style="color: var(--text-tertiary); font-size: 0.875rem; text-decoration: underline;">← Back to user login</a>
    </div>
  </div>
</section>

</body>
</html>
